# Zabbix agent UserParameter config for mountsentinel
# Drop this file in /etc/zabbix/zabbix_agentd.d/ and restart the agent.
#
# mountsentinel writes /run/mountsentinel/zabbix.json on every state change (tmpfs, always writable).
# These UserParameter entries read from that file via 'mountsentinel status'.
#
# In Zabbix, create:
#   - Discovery rule: key mountsentinel.discovery  (LLD for auto-creating per-mount items)
#   - Item prototypes keyed by {#MOUNT}:
#       mountsentinel.state[{#MOUNT}]
#       mountsentinel.reboot_count[{#MOUNT}]
#       mountsentinel.last_event[{#MOUNT}]
#       mountsentinel.suppressed[{#MOUNT}]

# LLD discovery: returns JSON array of watched mounts for auto-item creation
UserParameter=mountsentinel.discovery,/usr/local/bin/mountsentinel status --format=zabbix-discovery

# Per-mount item values (macro {#MOUNT} passed as $1)
UserParameter=mountsentinel.state[*],/usr/local/bin/mountsentinel status --mount "$1" --key state --format=value 2>/dev/null || echo "UNKNOWN"
UserParameter=mountsentinel.reboot_count[*],/usr/local/bin/mountsentinel status --mount "$1" --key reboot_count --format=value 2>/dev/null || echo "0"
UserParameter=mountsentinel.last_event[*],/usr/local/bin/mountsentinel status --mount "$1" --key last_event --format=value 2>/dev/null || echo ""
UserParameter=mountsentinel.suppressed[*],/usr/local/bin/mountsentinel status --mount "$1" --key suppressed --format=value 2>/dev/null || echo "0"
